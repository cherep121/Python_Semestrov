<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Вход - Гид по странам мира</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-in;
            border: 1px solid #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2.5em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #aaa;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #888;
            background: #333;
        }

        input[type="text"]::placeholder {
            color: #777;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #444;
            border-color: #777;
        }

        .error-message {
            background: #2a1a1a;
            color: #ff8888;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #5a2a2a;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🌍 Гид по странам</h1>
            <p>Войдите, чтобы продолжить</p>
        </div>

        {% if error %}
        <div class="error-message">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <label>👤 Ваше имя</label>
                <input type="text" name="username" placeholder="Введите ваше имя..." required autofocus>
            </div>
            <button type="submit">Войти</button>
        </form>
        
        <div class="info-text">
            💡 Вся ваша активность будет сохранена в лог-файл с вашим именем
        </div>
    </div>
</body>
</html>
